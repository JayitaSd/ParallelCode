spring.application.name=Backend

spring.datasource.url=jdbc:postgresql://localhost:5432/Ide
spring.datasource.username=postgres
spring.datasource.password=${db_password}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

jwt.secret=${jwt_secret}
jwt.expiration=86400000

# ==========================================
# Redis Configuration
# ==========================================
# Connection settings
# Use localhost for local development when running against Docker redis-server
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Connection pool settings
spring.data.redis.jedis.pool.max-active=20
spring.data.redis.jedis.pool.max-idle=10
spring.data.redis.jedis.pool.min-idle=5
spring.data.redis.jedis.pool.max-wait=-1ms

# ==========================================
# Document Persistence Configuration
# ==========================================
# Enable/disable automatic persistence scheduler
app.document.persistence.enabled=true

# Persistence interval in milliseconds (default: 30 seconds)
# Adjust based on your load and durability requirements
app.document.persistence.interval=30000

